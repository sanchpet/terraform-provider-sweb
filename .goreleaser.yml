# GoReleaser config for a Terraform provider published to the Terraform Registry.
# Produces the registry-required archive layout + GPG-signed SHA256SUMS.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows, freebsd]
    goarch: [amd64, arm64, arm, "386"]
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
    binary: "{{ .ProjectName }}_v{{ .Version }}"

archives:
  - formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256
  # The registry verifies the manifest by its checksum, so it must be listed in
  # SHA256SUMS (the signed file) — not only uploaded as a release asset below.
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

signs:
  - artifacts: checksum
    args:
      # GPG_FINGERPRINT is provided by the release workflow.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  github:
    owner: sanchpet
    name: terraform-provider-sweb
  # Registry ingests the GitHub release; keep it a real (non-draft) release.
  draft: false
  extra_files:
    # The registry reads protocol versions from this manifest; without it it
    # falls back to protocol 5.0 and mishandles a Plugin Framework provider.
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

changelog:
  disable: true
