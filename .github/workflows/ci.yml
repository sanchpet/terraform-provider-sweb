name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Lint
        run: mise run lint
      - name: Test
        run: mise run test
      - name: Acceptance tests (mock backend)
        run: mise run testacc
